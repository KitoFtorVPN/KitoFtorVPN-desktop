<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Настройки — KitoFtorVPN</title>
  <style>
    :root {
      --bg: #0b1120;
      --surface: #111827;
      --border: rgba(255,255,255,0.06);
      --accent: #10b981;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --text-muted: #475569;
      --danger: #f43f5e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
    }

    .titlebar {
      display: flex; justify-content: space-between; align-items: center;
      height: 38px; padding: 0 12px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag; flex-shrink: 0;
    }
    .titlebar-title { font-size: 12px; font-weight: 600; color: var(--text-dim); }
    .titlebar-btns { -webkit-app-region: no-drag; }
    .titlebar-btns button {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; width: 30px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .titlebar-btns button:hover { background: rgba(255,255,255,0.06); color: var(--text-dim); }

    .content {
      flex: 1; padding: 20px 24px;
    }

    .section-title {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }

    .setting-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
    }

    .setting-info {
      flex: 1; margin-right: 16px;
    }
    .setting-label {
      font-size: 14px; font-weight: 600;
      margin-bottom: 2px;
    }
    .setting-desc {
      font-size: 12px; color: var(--text-dim);
      line-height: 1.4;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px; height: 24px;
      flex-shrink: 0;
    }
    .toggle input {
      opacity: 0; width: 0; height: 0;
    }
    .toggle-track {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: all 0.2s;
    }
    .toggle input:checked + .toggle-track {
      background: var(--accent);
    }
    .toggle input:checked + .toggle-track::after {
      transform: translateX(20px);
      background: white;
    }

    .version {
      margin-top: 20px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">Настройки</span>
    <div class="titlebar-btns">
      <button onclick="api.closeSettings()">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div class="content">
    <div class="section-title">Запуск</div>

    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-label">Автозапуск</div>
        <div class="setting-desc">Запускать при старте Windows</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="autostart" onchange="toggleAutostart()">
        <span class="toggle-track"></span>
      </label>
    </div>

    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-label">Автоподключение</div>
        <div class="setting-desc">Подключаться к VPN при запуске</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="autoconnect" onchange="toggleAutoconnect()">
        <span class="toggle-track"></span>
      </label>
    </div>

    <div class="section-title" style="margin-top:16px">Маршрутизация</div>

    <div class="setting-row" style="cursor:pointer" onclick="api.openWhitelist()">
      <div class="setting-info">
        <div class="setting-label">Сайты в обход VPN</div>
        <div class="setting-desc">Указанные сайты будут открываться напрямую</div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-dim)">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>

    <div class="version" id="version">KitoFtorVPN</div>
  </div>

  <script>
    async function init() {
      const s = await api.getSettings();
      document.getElementById('autostart').checked = s.autostart || false;
      document.getElementById('autoconnect').checked = s.autoconnect || false;
      try {
        const v = await api.getVersion();
        document.getElementById('version').textContent = `KitoFtorVPN v${v}`;
      } catch(e) {
        document.getElementById('version').textContent = 'KitoFtorVPN';
      }
    }

    async function toggleAutostart() {
      await api.setSettings({ autostart: document.getElementById('autostart').checked });
    }

    async function toggleAutoconnect() {
      await api.setSettings({ autoconnect: document.getElementById('autoconnect').checked });
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Обновление — KitoFtorVPN</title>
  <style>
    :root {
      --bg: #0b1120;
      --surface: #111827;
      --border: rgba(255,255,255,0.06);
      --accent: #10b981;
      --accent-hover: #34d399;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --text-muted: #475569;
      --danger: #f43f5e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
    }

    .titlebar {
      display: flex; justify-content: space-between; align-items: center;
      height: 38px; padding: 0 12px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag; flex-shrink: 0;
    }
    .titlebar-title { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .titlebar-btns { display: flex; gap: 2px; -webkit-app-region: no-drag; }
    .titlebar-btns button {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; width: 30px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .titlebar-btns button:hover { background: rgba(255,255,255,0.06); color: var(--text-dim); }

    .body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 24px 20px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon svg { color: var(--accent); }

    .header-text {}
    .header-app { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-bottom: 2px; }
    .header-title { font-size: 17px; font-weight: 700; color: var(--text); }
    .header-sub { font-size: 13px; color: var(--text-dim); margin-top: 2px; }

    .divider {
      height: 1px; background: var(--border); margin-bottom: 16px;
    }

    .changelog-label {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .changelog {
      flex: 1;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.7;
      margin-bottom: 18px;
    }
    .changelog::-webkit-scrollbar { width: 4px; }
    .changelog::-webkit-scrollbar-track { background: transparent; }
    .changelog::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .changelog.loading {
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
    }

    .changelog p { margin-bottom: 8px; }
    .changelog p:last-child { margin-bottom: 0; }
    .changelog ul { padding-left: 18px; }
    .changelog li { margin-bottom: 4px; }
    .changelog h1, .changelog h2, .changelog h3 {
      font-size: 13px; font-weight: 600; color: var(--text);
      margin-bottom: 8px; margin-top: 12px;
    }
    .changelog h1:first-child, .changelog h2:first-child, .changelog h3:first-child {
      margin-top: 0;
    }
    .changelog strong { color: var(--text); font-weight: 600; }
    .changelog code {
      background: rgba(255,255,255,0.06); border-radius: 4px;
      padding: 1px 5px; font-family: 'Consolas', monospace; font-size: 12px;
    }

    /* Прогресс скачивания — встроен внизу, под чейнджлогом, над кнопками.
       Скрыт по умолчанию, появляется только во время реальной скачки. */
    .progress-wrap {
      display: none;
      margin-bottom: 14px;
    }
    .progress-wrap.visible { display: block; }
    .progress-row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 7px;
    }
    .progress-label { font-size: 12px; color: var(--text-dim); }
    .progress-percent { font-size: 12px; font-weight: 700; color: var(--text); }
    .progress-track {
      height: 6px; border-radius: 4px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 4px;
      background: var(--accent);
      width: 0%;
      transition: width 0.2s ease;
    }

    .checkbox-row {
      display: flex; align-items: center; gap: 9px;
      margin-bottom: 6px; cursor: pointer;
    }
    .checkbox-row input {
      width: 16px; height: 16px; accent-color: var(--accent);
      cursor: pointer; flex-shrink: 0;
    }
    .checkbox-row label {
      font-size: 12.5px; color: var(--text-dim); cursor: pointer;
    }
    .checkbox-hint {
      font-size: 11px; color: var(--text-muted);
      margin-bottom: 14px; margin-left: 25px; line-height: 1.4;
    }

    .actions {
      display: flex; gap: 10px; flex-shrink: 0;
    }

    .btn {
      flex: 1; height: 40px; border-radius: 10px;
      border: none; font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-dim);
      border: 1px solid var(--border);
      flex: 0 0 auto;
      padding: 0 20px;
    }
    .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.04); color: var(--text); }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">KitoFtorVPN — Обновление</span>
    <div class="titlebar-btns">
      <button onclick="skip()">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div class="body">
    <div class="header">
      <div class="icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="header-text">
        <div class="header-app">KitoFtorVPN</div>
        <div class="header-title" id="versionTitle">Доступно обновление</div>
        <div class="header-sub" id="versionSub">Новая версия готова к загрузке</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="changelog-label">Что нового</div>
    <div class="changelog loading" id="changelog">Загрузка...</div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-row">
        <span class="progress-label">Загрузка обновления</span>
        <span class="progress-percent" id="progressPercent">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="checkbox-row" onclick="toggleCheckbox()">
      <input type="checkbox" id="skipCheckbox">
      <label for="skipCheckbox">Не спрашивать больше об обновлении</label>
    </div>
    <div class="checkbox-hint">Проверить обновление можно в любой момент в настройках программы</div>

    <div class="actions" id="actions"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const version = params.get('version') || '';
    const owner = 'KitoFtorVPN';
    const repo = 'KitoFtorVPN-desktop';
    let stage = params.get('stage') || 'available'; // 'available' | 'downloaded'
    let downloading = false;

    function toggleCheckbox() {
      const cb = document.getElementById('skipCheckbox');
      cb.checked = !cb.checked;
    }

    function renderActions() {
      const actions = document.getElementById('actions');
      if (stage === 'downloaded') {
        actions.innerHTML = `
          <button class="btn btn-secondary" onclick="skip()">Нет</button>
          <button class="btn btn-primary" onclick="install()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Установить
          </button>`;
      } else {
        actions.innerHTML = `
          <button class="btn btn-secondary" id="laterBtn" onclick="skip()">Позже</button>
          <button class="btn btn-primary" id="downloadBtn" onclick="startDownload()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Обновить
          </button>`;
      }
    }

    function applyStage(v) {
      if (v) {
        document.getElementById('versionTitle').textContent = stage === 'downloaded'
          ? `Версия ${v} скачана`
          : `Доступна версия ${v}`;
      }
      document.getElementById('versionSub').textContent = stage === 'downloaded'
        ? 'Обновление готово к установке'
        : 'Новая версия готова к загрузке';
      document.getElementById('progressWrap').classList.remove('visible');
      downloading = false;
      renderActions();
    }

    applyStage(version);

    async function loadChangelog() {
      const el = document.getElementById('changelog');
      try {
        const tag = version ? `v${version}` : 'latest';
        const url = tag === 'latest'
          ? `https://api.github.com/repos/${owner}/${repo}/releases/latest`
          : `https://api.github.com/repos/${owner}/${repo}/releases/tags/${tag}`;

        const res = await fetch(url, {
          headers: { 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!res.ok) throw new Error('not found');
        const data = await res.json();

        el.classList.remove('loading');

        const body = (data.body || '').trim();
        if (!body) {
          el.innerHTML = '<p style="color:var(--text-muted)">Описание изменений не указано.</p>';
          return;
        }

        // Simple markdown-to-html
        el.innerHTML = parseMarkdown(body);
      } catch(e) {
        el.classList.remove('loading');
        el.innerHTML = '<p style="color:var(--text-muted)">Не удалось загрузить список изменений.</p>';
      }
    }

    function parseMarkdown(md) {
      return md
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/### (.+)/g, '<h3>$1</h3>')
        .replace(/## (.+)/g, '<h2>$1</h2>')
        .replace(/# (.+)/g, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^[-*] (.+)/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(?!<[hul])(.+)$/gm, (m) => m.startsWith('<') ? m : `<p>${m}</p>`)
        .replace(/<p><\/p>/g, '');
    }

    async function startDownload() {
      if (downloading) return;
      downloading = true;
      const downloadBtn = document.getElementById('downloadBtn');
      const laterBtn = document.getElementById('laterBtn');
      if (downloadBtn) { downloadBtn.disabled = true; }
      if (laterBtn) { laterBtn.disabled = true; }
      document.getElementById('progressWrap').classList.add('visible');
      document.getElementById('progressPercent').textContent = '0%';
      document.getElementById('progressFill').style.width = '0%';

      const res = await api.updateDownload();
      if (res && res.error) {
        // Скачивание не удалось — возвращаем кнопки в рабочее состояние,
        // чтобы можно было попробовать ещё раз.
        downloading = false;
        if (downloadBtn) { downloadBtn.disabled = false; }
        if (laterBtn) { laterBtn.disabled = false; }
        document.getElementById('progressWrap').classList.remove('visible');
      }
      // Успех: дальше ждём update:setStage('downloaded') от main-процесса.
    }

    function install() {
      api.updateInstall();
    }

    function skip() {
      const dontAskAgain = document.getElementById('skipCheckbox').checked;
      api.updateSkip({ dontAskAgain });
    }

    api.onUpdateProgress(({ percent }) => {
      const p = Math.round(percent || 0);
      document.getElementById('progressPercent').textContent = `${p}%`;
      document.getElementById('progressFill').style.width = `${p}%`;
    });

    api.onUpdateSetStage(({ stage: newStage, version: newVersion }) => {
      stage = newStage || stage;
      applyStage(newVersion || version);
      if (newVersion && newVersion !== version) {
        loadChangelog();
      }
    });

    loadChangelog();
  </script>
</body>
</html>

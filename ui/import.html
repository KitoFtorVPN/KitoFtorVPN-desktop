<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>KitoFtorVPN</title>
  <style>
    @font-face {
      font-family: 'SF';
      src: local('-apple-system'), local('Segoe UI'), local('sans-serif');
    }

    :root {
      --bg: #0b1120;
      --surface: #111827;
      --border: rgba(255,255,255,0.06);
      --accent: #10b981;
      --accent-hover: #34d399;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --text-muted: #475569;
      --danger: #f43f5e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
    }

    /* ── Titlebar ── */
    .titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 38px;
      padding: 0 12px;
      background: rgba(11, 17, 32, 0.95);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .titlebar-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .titlebar-btns {
      display: flex;
      gap: 2px;
      -webkit-app-region: no-drag;
    }
    .titlebar-btns button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      width: 30px;
      height: 26px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .titlebar-btns button:hover {
      background: rgba(255,255,255,0.06);
      color: var(--text-dim);
    }
    .titlebar-btns .close:hover {
      background: rgba(244,63,94,0.15);
      color: var(--danger);
    }

    /* ── Content ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 36px;
    }

    /* ── Logo ── */
    .logo {
      margin-bottom: 40px;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    .logo-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 14px;
      background: rgba(16, 185, 129, 0.1);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg {
      width: 32px;
      height: 32px;
      color: var(--accent);
    }
    .logo-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    /* ── Import area ── */
    .import-area {
      width: 100%;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .drop-zone {
      width: 100%;
      padding: 32px 20px;
      border: 2px dashed rgba(255,255,255,0.08);
      border-radius: 14px;
      background: var(--surface);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .drop-zone:hover {
      border-color: rgba(16, 185, 129, 0.3);
      background: rgba(16, 185, 129, 0.03);
    }
    .drop-zone:active {
      transform: scale(0.99);
    }

    .drop-icon {
      width: 44px;
      height: 44px;
      margin: 0 auto 12px;
      border-radius: 12px;
      background: rgba(16, 185, 129, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .drop-icon svg {
      width: 22px;
      height: 22px;
      color: var(--accent);
    }

    .drop-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .drop-hint {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    /* ── Hint ── */
    .bottom-hint {
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
      animation: fadeUp 0.5s ease 0.2s both;
    }

    /* ── Success state ── */
    .success {
      text-align: center;
      animation: fadeUp 0.4s ease;
    }
    .success-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: rgba(16, 185, 129, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .success-icon svg {
      width: 30px;
      height: 30px;
      color: var(--accent);
    }
    .success-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .success-text {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.7;
      margin-bottom: 28px;
      max-width: 280px;
      margin-left: auto;
      margin-right: auto;
    }
    .btn-start {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 46px;
      padding: 0 32px;
      background: var(--accent);
      color: #0b1120;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-start:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
    .btn-start:active {
      transform: translateY(0);
    }

    /* ── Error ── */
    .error-msg {
      margin-top: 14px;
      font-size: 13px;
      color: var(--danger);
      text-align: center;
      animation: fadeIn 0.3s;
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">KitoFtorVPN</span>
    <div class="titlebar-btns">
      <button onclick="api.minimize()">
        <svg width="11" height="1" viewBox="0 0 11 1"><rect width="11" height="1" rx="0.5" fill="currentColor"/></svg>
      </button>
      <button class="close" onclick="api.close()">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div class="content" id="app">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="logo-name">KitoFtorVPN</div>
    </div>

    <div class="import-area">
      <div class="drop-zone" onclick="doImport()">
        <div class="drop-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="drop-title">Загрузите конфигурацию</div>
        <div class="drop-hint">Выберите .conf файл из личного кабинета</div>
      </div>
      <div class="error-msg" id="error" style="display:none"></div>
    </div>

    <div class="bottom-hint">
      Файл конфигурации можно скачать<br>в личном кабинете или у бота.
    </div>
  </div>

  <script>
    async function doImport() {
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';

      const res = await api.importConfig();

      if (res.canceled) return;

      if (res.error) {
        errEl.textContent = res.error;
        errEl.style.display = 'block';
        return;
      }

      if (res.ok) {
        showSuccess();
      }
    }

    function showSuccess() {
      document.getElementById('app').innerHTML = `
        <div class="success">
          <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="success-title">Конфигурация сохранена</div>
          <div class="success-text">
            Ваше соединение надёжно защищено в приложении.
            Оригинальный файл можно удалить с компьютера.
          </div>
          <button class="btn-start" onclick="api.goToMain()">Начать</button>
        </div>
      `;
    }
  </script>
</body>
</html>

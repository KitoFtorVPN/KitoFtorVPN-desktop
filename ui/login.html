<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>KitoFtorVPN</title>
  <style>
    :root {
      --bg: #0b1120;
      --surface: #111827;
      --border: rgba(255,255,255,0.06);
      --accent: #10b981;
      --accent-hover: #34d399;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --text-muted: #475569;
      --danger: #f43f5e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
    }

    .titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 38px;
      padding: 0 12px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .titlebar-title { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .titlebar-btns { display: flex; gap: 2px; -webkit-app-region: no-drag; }
    .titlebar-btns button {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; width: 30px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .titlebar-btns button:hover { background: rgba(255,255,255,0.06); color: var(--text-dim); }
    .titlebar-btns .close:hover { background: rgba(244,63,94,0.15); color: var(--danger); }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 36px 20px;
    }

    .logo {
      margin-bottom: 26px;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    .logo-icon {
      width: 56px; height: 56px;
      margin: 0 auto 10px;
      background: rgba(16,185,129,0.1);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 28px; height: 28px; color: var(--accent); }
    .logo-name { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

    .btn-group {
      width: 100%; max-width: 280px;
      display: flex; flex-direction: column; gap: 10px;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; height: 44px;
      border: none; border-radius: 12px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent); color: var(--bg);
    }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: rgba(255,255,255,0.04); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.07); transform: translateY(-1px); }
    .btn-secondary:active { transform: translateY(0); }

    .divider {
      display: flex; align-items: center;
      width: 100%; max-width: 280px;
      margin: 14px 0; gap: 14px;
      animation: fadeUp 0.5s ease 0.2s both;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

    .oauth-row {
      display: flex; gap: 10px;
      width: 100%; max-width: 280px;
      animation: fadeUp 0.5s ease 0.3s both;
    }
    .oauth-row .btn { flex: 1; height: 46px; font-size: 13px; font-weight: 500; }
    .oauth-row .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .hint {
      margin-top: 18px; font-size: 11px; color: var(--text-muted);
      text-align: center; line-height: 1.5;
      animation: fadeUp 0.5s ease 0.4s both;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">KitoFtorVPN</span>
    <div class="titlebar-btns">
      <button onclick="api.minimize()">
        <svg width="11" height="1" viewBox="0 0 11 1"><rect width="11" height="1" rx="0.5" fill="currentColor"/></svg>
      </button>
      <button class="close" onclick="api.close()">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div class="content">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="logo-name">KitoFtorVPN</div>
      <div class="logo-sub">Безопасный интернет</div>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="api.login()">Войти</button>
      <button class="btn btn-secondary" onclick="api.register()">Создать аккаунт</button>
      <button class="btn btn-secondary" onclick="api.guestLogin()">Войти как гость</button>
    </div>

    <div class="divider"><span>или</span></div>

    <div class="oauth-row">
      <button class="btn btn-secondary" onclick="api.google()">
        <svg viewBox="0 0 24 24"><path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
      <button class="btn btn-secondary" onclick="api.telegram()">
        <svg viewBox="0 0 24 24"><path fill="#29b6f6" d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>
        Telegram
      </button>
    </div>

    <div class="hint">
      Откроется браузер для входа.<br>
      После авторизации вернётесь сюда.
    </div>
  </div>
</body>
</html>

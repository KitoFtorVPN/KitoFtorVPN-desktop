<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>KitoFtorVPN</title>
  <style>
    :root {
      --bg: #0b1120;
      --surface: #111827;
      --border: rgba(255,255,255,0.06);
      --accent: #10b981;
      --accent-hover: #34d399;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --text-muted: #475569;
      --danger: #f43f5e;
      --warning: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
      transition: background-color 0.8s ease;
    }
    body.state-on { background: #06201a; }
    body.state-connecting { background: #15130a; }

    /* ── Titlebar ── */
    .titlebar {
      display: flex; justify-content: space-between; align-items: center;
      height: 38px; padding: 0 12px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag; flex-shrink: 0;
    }
    .titlebar-title { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .titlebar-btns { display: flex; gap: 2px; -webkit-app-region: no-drag; }
    .titlebar-btns button {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; width: 30px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .titlebar-btns button:hover { background: rgba(255,255,255,0.06); color: var(--text-dim); }
    .titlebar-btns .close:hover { background: rgba(244,63,94,0.15); color: var(--danger); }

    /* ── Content ── */
    .content {
      display: flex; flex-direction: column;
      align-items: center; padding: 0 28px;
    }

    /* ── Top bar ── */
    .top-bar {
      width: 100%;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; flex-shrink: 0;
    }
    .app-name { font-size: 14px; font-weight: 700; }
    .btn-menu {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      width: 32px; height: 32px; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; position: relative;
    }
    .btn-menu:hover { border-color: rgba(255,255,255,0.12); color: var(--text-dim); }

    .menu-dropdown {
      display: none; position: absolute; top: 38px; right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px; min-width: 200px; z-index: 100;
    }
    .menu-dropdown.open { display: block; }
    .menu-item {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 9px 12px;
      background: none; border: none; border-radius: 7px;
      color: var(--text-dim); font-family: inherit; font-size: 13px;
      cursor: pointer; transition: all 0.12s; text-align: left;
    }
    .menu-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .menu-item.danger:hover { background: rgba(244,63,94,0.08); color: var(--danger); }
    .menu-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Status card ── */
    .status-card {
      width: 100%;
      background: var(--surface);
      border-radius: 12px;
      padding: 4px 16px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .status-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0;
    }
    .status-row + .status-row { border-top: 1px solid var(--border); }
    .status-label { font-size: 13px; color: var(--text-dim); }
    .status-value { font-size: 14px; font-weight: 600; }
    .val-active { color: var(--accent); }
    .val-expired { color: var(--danger); }
    .val-none { color: var(--text-muted); }
    .val-neutral { color: var(--text); }

    /* ── VPN center ── */
    .vpn-center {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; width: 100%;
    }

    /* Power button */
    .power-btn {
      width: 140px; height: 140px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.06);
      background: var(--surface);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s; margin-bottom: 20px;
    }
    .power-btn svg { width: 44px; height: 44px; color: var(--text-muted); transition: all 0.3s; }
    .power-btn:hover { border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.04); }
    .power-btn:hover svg { color: var(--accent); }
    .power-btn:active { transform: scale(0.96); }
    .power-btn:disabled { cursor: not-allowed; opacity: 0.5; pointer-events: none; }

    .power-btn.on {
      border-color: var(--accent); background: rgba(16,185,129,0.08);
      box-shadow: 0 0 40px rgba(16,185,129,0.1);
    }
    .power-btn.on svg { color: var(--accent); }
    .power-btn.on:hover { border-color: var(--danger); background: rgba(244,63,94,0.04); }
    .power-btn.on:hover svg { color: var(--danger); }

    .power-btn.connecting {
      border-color: var(--warning); background: rgba(245,158,11,0.05);
      animation: pulse 1.8s ease-in-out infinite;
    }
    .power-btn.connecting svg { color: var(--warning); }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(245,158,11,0); }
      50% { box-shadow: 0 0 30px rgba(245,158,11,0.1); }
    }

    .vpn-status { font-size: 20px; font-weight: 700; margin-bottom: 4px; transition: color 0.3s; }
    .vpn-status.off { color: var(--text-muted); }
    .vpn-status.connecting { color: var(--warning); }
    .vpn-status.on { color: var(--accent); }

    .vpn-hint { font-size: 13px; color: var(--text-muted); height: 18px; }

    /* ── Import prompt ── */
    .import-prompt {
      text-align: center;
      padding: 20px 0;
    }
    .import-prompt p {
      font-size: 14px; color: var(--text-dim);
      line-height: 1.7; margin-bottom: 18px;
    }
    .import-link {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: none;
      color: var(--accent); font-family: inherit;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: color 0.15s;
      text-decoration: underline;
      text-decoration-color: rgba(16,185,129,0.3);
      text-underline-offset: 3px;
    }
    .import-link:hover { color: var(--accent-hover); text-decoration-color: rgba(52,211,153,0.5); }
    .import-link svg { width: 16px; height: 16px; }

    /* ── Renewal warning ── */
    .renewal-banner {
      width: 100%;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: rgba(244,63,94,0.06);
      border: 1px solid rgba(244,63,94,0.12);
      border-radius: 10px;
      margin-top: 8px;
    }
    .renewal-banner-text {
      font-size: 13px; color: var(--danger);
    }
    .renewal-banner-link {
      background: none; border: none;
      color: var(--danger); font-family: inherit;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .renewal-banner-link:hover { opacity: 0.8; }

    /* ── Buy/renew button ── */
    .btn-renew {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      height: 42px; padding: 0 24px;
      background: rgba(244,63,94,0.08);
      border: 1px solid rgba(244,63,94,0.15);
      border-radius: 10px;
      color: var(--danger); font-family: inherit;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      margin-top: 4px;
    }
    .btn-renew:hover {
      background: rgba(244,63,94,0.12);
      border-color: rgba(244,63,94,0.25);
    }

    /* ── Import success toast ── */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid rgba(16,185,129,0.2);
      border-radius: 10px; padding: 12px 20px;
      font-size: 13px; color: var(--accent);
      display: flex; align-items: center; gap: 8px;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 4s forwards;
      z-index: 100;
    }
    .toast svg { width: 16px; height: 16px; flex-shrink: 0; }

    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

    .error-msg {
      margin-top: 14px; font-size: 13px; color: var(--danger);
      text-align: center; max-width: 260px;
    }

    .loading {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 14px;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">KitoFtorVPN</span>
    <div class="titlebar-btns">
      <button onclick="api.minimize()">
        <svg width="11" height="1" viewBox="0 0 11 1"><rect width="11" height="1" rx="0.5" fill="currentColor"/></svg>
      </button>
      <button class="close" onclick="api.close()">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div class="content" id="app">
    <div class="loading">Загрузка...</div>
  </div>
  <!-- Static VPN center — lives outside #app so render() never wipes it -->
  <div class="vpn-center" id="vpnCenterWrap" style="display:none">
    <button class="power-btn off" id="powerBtn" onclick="toggleVPN()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="44" height="44">
        <path d="M18.36 6.64a9 9 0 11-12.73 0"/>
        <line x1="12" y1="2" x2="12" y2="12"/>
      </svg>
    </button>
    <div class="vpn-status off" id="vpnStatusText">Не подключено</div>
    <div class="vpn-hint" id="vpnHint">Нажмите для подключения</div>
    <div id="sessionTimer" style="font-size:16px;font-weight:600;color:var(--accent);margin-top:2px;height:20px;visibility:hidden"></div>
    <div class="error-msg" id="error" style="display:none"></div>
  </div>

  <script>
    const SITE_URL = 'https://my.kitoftorvpn.fun';
    let subData = null;
    let vpnState = 'off';
    let hasConf = false;
    let menuOpen = false;
    let connectReason = null; // 'whitelist' during whitelist-triggered restart



    // Listen for VPN events from main process.
    if (api.onReconnecting) {
      api.onReconnecting((p) => {
        connectReason = p && p.reason ? p.reason : null;
        vpnState = 'connecting';
        render();
      });
    }
    if (api.onReconnected) {
      api.onReconnected((p) => {
        connectReason = null;
        vpnState = p && p.ok ? 'on' : 'off';
        render();
        startSessionTimer();
      });
    }
    // Autoconnect events — show connecting state immediately on startup.
    if (api.onAutoConnecting) {
      api.onAutoConnecting((p) => {
        connectReason = p && p.reason ? p.reason : null;
        vpnState = 'connecting';
        render();
      });
    }
    if (api.onAutoConnected) {
      api.onAutoConnected((p) => {
        connectReason = null;
        vpnState = p && p.ok ? 'on' : 'off';
        render();
        startSessionTimer();
        if (p && p.error) showError(p.error);
      });
    }

    let isGuestMode = false;

    async function init() {
      isGuestMode = await api.isGuest();
      const token = await api.getToken();
      if (!token && !isGuestMode) return;

      if (isGuestMode) {
        // Guest: no subscription, no API calls. Fake "active" sub so UI logic
        // doesn't block the connect button.
        subData = { status: 'active', time_left: null, expires_in: null };
      } else {
        const sub = await api.fetch('/api/sub');
        if (sub.error === 'unauthorized' || sub.redirect) {
          // Session expired on server — go back to login but keep the token
          // on disk so the user isn't forced to re-enter credentials if the
          // server was just temporarily unavailable.
          await api.sessionExpired();
          return;
        }
        subData = sub;
        // Notify if subscription expires within 3 days
        if (sub.expires_in !== undefined && sub.expires_in !== null && sub.expires_in <= 259200) {
          const daysLeft = Math.ceil(sub.expires_in / 86400);
          api.notifySubExpiring(daysLeft);
        }
      }

      hasConf = await api.configExists();

      const vpn = await api.vpnStatus();
      if (vpn.status === 'RUNNING') vpnState = 'on';

      render();
      startSessionTimer();
      setInterval(pollVPN, 3000);

      // Refresh subscription only for real users.
      if (!isGuestMode) {
        setInterval(async () => {
          const fresh = await api.fetch('/api/sub');
          if (!fresh.error) {
            subData = fresh;
            render();
            startSessionTimer();
          }
        }, 60000);
      }
    }

    let timerInterval = null;

    let cachedConnectTime = null;

    function formatTimer() {
      if (!cachedConnectTime) return '';
      const diff = Math.floor((Date.now() - cachedConnectTime) / 1000);
      if (diff < 0) return '';
      const h = String(Math.floor(diff / 3600)).padStart(2, '0');
      const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
      const s = String(diff % 60).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    async function startSessionTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      if (vpnState !== 'on') {
        cachedConnectTime = null;
        const el = document.getElementById('sessionTimer');
        if (el) { el.style.visibility = 'hidden'; el.textContent = ''; }
        return;
      }

      // Fetch connect time once — then tick locally. Avoids IPC on every
      // second, which was causing the timer to briefly vanish.
      cachedConnectTime = await api.getConnectTime();
      if (!cachedConnectTime) return;

      const tick = () => {
        const el = document.getElementById('sessionTimer');
        if (!el || !cachedConnectTime) return;
        el.textContent = formatTimer();
        el.style.visibility = 'visible';
      };
      tick(); // show immediately, don't wait 1s
      timerInterval = setInterval(() => {
        if (vpnState !== 'on') {
          clearInterval(timerInterval); timerInterval = null;
          const el = document.getElementById('sessionTimer');
          if (el) { el.style.visibility = 'hidden'; el.textContent = ''; }
          return;
        }
        tick();
      }, 1000);
    }

    async function pollVPN() {
      const vpn = await api.vpnStatus();
      const newState = vpn.status === 'RUNNING' ? 'on' : 'off';
      if (newState !== vpnState && vpnState !== 'connecting') {
        vpnState = newState;
        render();
        startSessionTimer();
      }
    }

    const powerIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="44" height="44"><path d="M18.36 6.64a9 9 0 11-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>`;

    function updateVpnCenter(s, canConnect) {
      const wrap = document.getElementById('vpnCenterWrap');
      const btn = document.getElementById('powerBtn');
      const statusEl = document.getElementById('vpnStatusText');
      const hintEl = document.getElementById('vpnHint');
      if (!wrap || !btn || !statusEl || !hintEl) return;

      // Remove any old dynamic content (import-prompt, btn-renew) injected previously
      ['importPrompt','btnRenew'].forEach(id => { const el = document.getElementById(id); if (el) el.remove(); });

      wrap.style.display = 'flex';

      if (!hasConf) {
        btn.style.display = 'none';
        statusEl.style.display = 'none';
        hintEl.style.display = 'none';
        if (!document.getElementById('importPrompt')) {
          const div = document.createElement('div');
          div.id = 'importPrompt';
          div.className = 'import-prompt';
          div.innerHTML = `<p>Для подключения загрузите<br>файл конфигурации (.conf)<br>из личного кабинета или бота</p>
            <button class="import-link" onclick="doImport()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Загрузить конфигурацию
            </button>`;
          wrap.insertBefore(div, wrap.firstChild);
        }
        return;
      }

      if (!canConnect) {
        btn.className = 'power-btn off';
        btn.disabled = true;
        btn.style.display = '';
        statusEl.style.display = '';
        statusEl.className = 'vpn-status off';
        statusEl.textContent = 'Не подключено';
        hintEl.style.display = 'none';
        if (!document.getElementById('btnRenew')) {
          const btnLabel = s.status === 'none' ? 'Оформить подписку' : 'Продлить подписку';
          const b = document.createElement('button');
          b.id = 'btnRenew';
          b.className = 'btn-renew';
          b.onclick = () => api.openExternal(SITE_URL + '/login?desktop=1');
          b.textContent = btnLabel;
          wrap.appendChild(b);
        }
        return;
      }

      // Normal connected/connecting/off state
      btn.style.display = '';
      btn.disabled = vpnState === 'connecting';
      btn.className = 'power-btn ' + vpnState;
      statusEl.style.display = '';
      statusEl.className = 'vpn-status ' + vpnState;
      statusEl.textContent = vpnState === 'on' ? 'Подключено'
        : vpnState === 'connecting' ? (connectReason === 'disconnecting' ? 'Отключение...' : connectReason === 'whitelist' ? 'Применение...' : 'Подключение...')
        : 'Не подключено';
      hintEl.style.display = '';
      hintEl.textContent = vpnState === 'connecting'
        ? (connectReason === 'disconnecting' ? 'Завершаем соединение' : connectReason === 'whitelist' ? 'Обновляем белый список' : 'Устанавливаем соединение')
        : vpnState === 'off' ? 'Нажмите для подключения' : '';
    }

    function render() {
      const app = document.getElementById('app');
      const wrap = document.getElementById('vpnCenterWrap');
      if (!subData) {
        app.innerHTML = '<div class="loading">Загрузка...</div>';
        if (wrap) wrap.style.display = 'none';
        return;
      }
      if (wrap) wrap.style.display = 'flex';

      document.body.className = vpnState === 'on' ? 'state-on' : vpnState === 'connecting' ? 'state-connecting' : '';

      const s = subData;
      let statusClass = 'val-none', statusText = 'Нет подписки';
      let canConnect = false;

      if (s.status === 'active') {
        statusClass = 'val-active';
        statusText = 'Активна';
        canConnect = true;
      } else if (s.status === 'expired') {
        statusClass = 'val-expired';
        statusText = 'Истекла';
      } else if (s.status === 'test_ended') {
        statusClass = 'val-expired';
        statusText = 'Тест завершён';
      }

      // Status card
      const THREE_DAYS = 259200;
      const isExpiring = s.expires_in && s.expires_in <= THREE_DAYS;
      const timeClass = isExpiring ? 'val-expired' : 'val-neutral';

      let cardHTML = '';
      if (isGuestMode) {
        cardHTML = `
          <div class="status-card">
            <div class="status-row">
              <span class="status-label">Режим</span>
              <span class="status-value val-neutral">Гостевой</span>
            </div>
          </div>`;
      } else {
        cardHTML = `
          <div class="status-card">
            <div class="status-row">
              <span class="status-label">Подписка</span>
              <span class="status-value ${statusClass}">${statusText}</span>
            </div>`;
        if (s.time_left) {
          cardHTML += `
            <div class="status-row">
              <span class="status-label">Осталось</span>
              <span class="status-value ${timeClass}">${s.time_left}</span>
            </div>`;
        }
        cardHTML += '</div>';

        // Renewal warning banner (< 3 days)
        if (isExpiring && s.status === 'active') {
          cardHTML += `
            <div class="renewal-banner">
              <span class="renewal-banner-text">Подписка заканчивается</span>
              <button class="renewal-banner-link" onclick="api.openExternal('${SITE_URL}/login?desktop=1')">Продлить</button>
            </div>`;
        }
      }

      // VPN center — update static DOM elements, never recreate them (prevents jumping).
      updateVpnCenter(s, canConnect);

      // Menu items
      let menuItems = '';

      menuItems += `
        <button class="menu-item" onclick="doOpenSettings()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          Настройки
        </button>`;
      if (isGuestMode) {
        menuItems += `
          <button class="menu-item" onclick="doExitGuest()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Войти в аккаунт
          </button>`;
      } else {
        menuItems += `
          <button class="menu-item danger" onclick="doLogout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Выйти из аккаунта
          </button>`;
      }

      app.innerHTML = `
        <div class="top-bar">
          <span class="app-name">KitoFtorVPN</span>
          <div style="position:relative">
            <button class="btn-menu" onclick="toggleMenu(event)">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="3" r="1.2" fill="currentColor"/>
                <circle cx="8" cy="8" r="1.2" fill="currentColor"/>
                <circle cx="8" cy="13" r="1.2" fill="currentColor"/>
              </svg>
            </button>
            <div class="menu-dropdown" id="menu">
              ${menuItems}
            </div>
          </div>
        </div>

        ${cardHTML}


      `;
    }

    async function toggleVPN() {
      if (vpnState === 'connecting') return;

      if (vpnState === 'on') {
        connectReason = 'disconnecting'; vpnState = 'connecting'; render();
        const res = await api.disconnect();
        connectReason = null; vpnState = res.ok ? 'off' : 'on';
        render();
        startSessionTimer();
        if (res.error) showError(res.error);
      } else {
        vpnState = 'connecting'; render();
        const res = await api.connect();
        vpnState = res.ok ? 'on' : 'off';
        render();
        startSessionTimer();
        if (res.error) showError(res.error);
      }
    }

    function showError(text) {
      const el = document.getElementById('error');
      if (el) { el.textContent = text; el.style.display = 'block'; }
    }

    function toggleMenu(e) {
      e.stopPropagation();
      menuOpen = !menuOpen;
      const m = document.getElementById('menu');
      if (m) m.classList.toggle('open', menuOpen);
    }

    document.addEventListener('click', () => {
      menuOpen = false;
      const m = document.getElementById('menu');
      if (m) m.classList.remove('open');
    });

    async function doImport() {
      const res = await api.importConfig();
      if (res.canceled) return;
      if (res.error) {
        showError(res.error);
        return;
      }
      if (res.ok) {
        hasConf = true;
        render();
        showToast();
      }
    }

    async function doLogout() {
      await api.logout();
    }

    async function doExitGuest() {
      await api.exitGuest();
    }

    async function doOpenSettings() {
      menuOpen = false;
      await api.openSettings();
    }

    function showToast() {
      // Remove existing toast
      const old = document.querySelector('.toast');
      if (old) old.remove();

      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Конфигурация сохранена. Оригинал можно удалить.
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 5000);
    }

    init();
  </script>
</body>
</html>
